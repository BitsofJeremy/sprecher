{% extends "base.html" %}

{% block title %}Speech-to-Text - Sprecher{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <!-- Page Header -->
    <div class="mb-8">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 rounded-xl bg-[var(--sp-accent2)]/20 flex items-center justify-center">
                <i class='bx bx-message-dots text-2xl text-[var(--sp-accent2)]'></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold">Speech-to-Text</h1>
                <p class="text-[var(--sp-muted)]">Transcribe audio to text</p>
            </div>
        </div>
    </div>

    <!-- STT Form Card -->
    <div class="card p-6">
        <form
            hx-post="/api/stt/sync"
            hx-swap="innerHTML"
            hx-target="#stt-result"
            hx-encoding="multipart/form-data"
            class="space-y-5"
        >
            <!-- File Upload / Drop Zone -->
            <div>
                <label class="block text-sm font-medium text-[var(--sp-muted)] mb-2">
                    Audio File
                </label>
                <div
                    id="drop-zone"
                    class="drop-zone p-8 text-center cursor-pointer"
                    onclick="document.getElementById('audio-file').click()"
                >
                    <input
                        type="file"
                        id="audio-file"
                        name="file"
                        accept="audio/*"
                        class="hidden"
                        onchange="handleFileSelect(this)"
                    >
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-full bg-[var(--sp-accent2)]/20 flex items-center justify-center">
                            <i class='bx bx-upload text-2xl text-[var(--sp-accent2)]'></i>
                        </div>
                        <div>
                            <p class="font-medium">Drop audio file here or click to browse</p>
                            <p class="text-sm text-[var(--sp-muted)]">Supports MP3, WAV, OGG, M4A, FLAC</p>
                        </div>
                    </div>
                </div>
                <p id="file-name" class="text-sm text-[var(--sp-muted)] mt-2 hidden"></p>
            </div>

            <!-- Language Selection -->
            <div>
                <label for="language" class="block text-sm font-medium text-[var(--sp-muted)] mb-2">
                    Language
                </label>
                <select id="language" name="language" class="w-full">
                    <option value="auto">Auto-detect</option>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                </select>
            </div>

            <!-- Model Selection -->
            <div>
                <label class="block text-sm font-medium text-[var(--sp-muted)] mb-3">
                    Engine
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="card p-4 cursor-pointer border-[var(--sp-accent)] has-[:checked]:border-[var(--sp-accent)] has-[:checked]:bg-[var(--sp-accent)]/10">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="engine" value="whisper" checked class="sr-only">
                            <div class="w-10 h-10 rounded-lg bg-[var(--sp-accent)]/20 flex items-center justify-center">
                                <i class='bx bx-ear text-xl text-[var(--sp-accent)]'></i>
                            </div>
                            <div>
                                <p class="font-medium">Whisper</p>
                                <p class="text-xs text-[var(--sp-muted)]">High accuracy</p>
                            </div>
                        </div>
                    </label>
                    <label class="card p-4 cursor-pointer border-[var(--sp-border)] hover:border-[var(--sp-accent2)] has-[:checked]:border-[var(--sp-accent2)] has-[:checked]:bg-[var(--sp-accent2)]/10">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="engine" value="faster-whisper" class="sr-only">
                            <div class="w-10 h-10 rounded-lg bg-[var(--sp-accent2)]/20 flex items-center justify-center">
                                <i class='bx bx-zap text-xl text-[var(--sp-accent2)]'></i>
                            </div>
                            <div>
                                <p class="font-medium">Faster-Whisper</p>
                                <p class="text-xs text-[var(--sp-muted)]">Optimized speed</p>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="btn-primary w-full py-3.5 rounded-xl font-medium flex items-center justify-center gap-2 mt-6"
            >
                <span>Transcribe</span>
                <i class='bx bx-scan'></i>
                <span class="htmx-indicator ml-2">
                    <i class='bx bx-loader-alt animate-spin'></i>
                </span>
            </button>
        </form>

        <!-- Result Area -->
        <div id="stt-result" class="mt-6">
            <!-- Transcription will appear here -->
        </div>
    </div>

    <!-- Supported Formats -->
    <div class="card p-5 mt-6">
        <h3 class="font-medium mb-3 flex items-center gap-2">
            <i class='bx bx-info-circle text-[var(--sp-accent2)]'></i>
            Supported Formats
        </h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm">
            <div class="flex items-center gap-2 text-[var(--sp-muted)]">
                <i class='bx bxs-file-audio'></i>
                <span>MP3</span>
            </div>
            <div class="flex items-center gap-2 text-[var(--sp-muted)]">
                <i class='bx bxs-file-audio'></i>
                <span>WAV</span>
            </div>
            <div class="flex items-center gap-2 text-[var(--sp-muted)]">
                <i class='bx bxs-file-audio'></i>
                <span>OGG</span>
            </div>
            <div class="flex items-center gap-2 text-[var(--sp-muted)]">
                <i class='bx bxs-file-audio'></i>
                <span>M4A</span>
            </div>
            <div class="flex items-center gap-2 text-[var(--sp-muted)]">
                <i class='bx bxs-file-audio'></i>
                <span>FLAC</span>
            </div>
            <div class="flex items-center gap-2 text-[var(--sp-muted)]">
                <i class='bx bxs-file-audio'></i>
                <span>WEBM</span>
            </div>
        </div>
    </div>
</div>

<script>
    // File input handler
    function handleFileSelect(input) {
        const fileName = document.getElementById('file-name');
        const dropZone = document.getElementById('drop-zone');
        if (input.files && input.files[0]) {
            const file = input.files[0];
            fileName.textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            fileName.classList.remove('hidden');
            dropZone.querySelector('.flex').innerHTML = `
                <div class="w-14 h-14 rounded-full bg-[var(--sp-success)]/20 flex items-center justify-center">
                    <i class='bx bx-check text-2xl text-[var(--sp-success)]'></i>
                </div>
                <div>
                    <p class="font-medium text-[var(--sp-success)]">${file.name}</p>
                    <p class="text-sm text-[var(--sp-muted)]">${(file.size / 1024 / 1024).toFixed(2)} MB - Click to change</p>
                </div>
            `;
        }
    }

    // Drag and drop handlers
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('audio-file');

    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            handleFileSelect(fileInput);
        }
    });

    // Success handler - parse JSON response and display transcription
    document.body.addEventListener('htmx:afterRequest', function(event) {
        if (event.detail.successful) {
            const xhr = event.detail.xhr;
            if (xhr && xhr.status === 200) {
                try {
                    const response = JSON.parse(xhr.responseText);
                    const resultDiv = document.getElementById('stt-result');
                    if (response.text) {
                        resultDiv.innerHTML = `
                            <div class="bg-[var(--sp-success)]/10 border border-[var(--sp-success)]/30 rounded-xl p-4">
                                <div class="flex items-start gap-3">
                                    <div class="w-10 h-10 rounded-full bg-[var(--sp-success)]/20 flex items-center justify-center flex-shrink-0">
                                        <i class='bx bx-check text-xl text-[var(--sp-success)]'></i>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <p class="font-medium text-[var(--sp-success)] mb-1">Transcription Complete</p>
                                        <p class="text-[var(--sp-fg)] leading-relaxed">${response.text}</p>
                                        <p class="text-xs text-[var(--sp-muted)] mt-2">
                                            Detected language: ${response.language || 'unknown'} 
                                            ${response.duration_seconds ? `• Duration: ${response.duration_seconds}s` : ''}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                } catch (e) {
                    // Fallback: display raw response if JSON parsing fails
                    resultDiv.innerHTML = xhr.responseText;
                }
                document.body.dispatchEvent(new CustomEvent('showToast', {
                    detail: { message: 'Transcription complete!', type: 'success' }
                }));
            }
        }
    });

    // Error handler
    document.body.addEventListener('htmx:request-error', function(event) {
        document.body.dispatchEvent(new CustomEvent('showToast', {
            detail: { message: 'Failed to transcribe. Please try again.', type: 'error' }
        }));
    });
</script>
{% endblock %}
